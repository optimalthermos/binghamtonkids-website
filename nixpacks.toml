# Fallback if Railway uses Nixpacks instead of Dockerfile
[phases.setup]
aptPkgs = ["nginx"]

[phases.build]
cmds = [
  "mkdir -p /usr/share/nginx/html",
  "cp -r . /usr/share/nginx/html/",
  "rm -f /etc/nginx/conf.d/default.conf",
  "envsubst '${PORT}' < nginx.conf.template > /etc/nginx/conf.d/default.conf"
]

[start]
cmd = "envsubst '${PORT}' < /usr/share/nginx/html/nginx.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
